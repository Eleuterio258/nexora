openapi: 3.1.0
info:
  title: FaceClock API
  description: Gateway stateless de captura e validacao biométrica de assiduidade.
    Apenas templates biométricos (face/digital) são persistidos localmente; todo o
    resto é delegado ao Nexora ERP.
  version: 1.0.0
paths:
  /api/v1/biometric/enroll:
    post:
      tags:
      - Biometric
      summary: Enroll Biometric
      operationId: enroll_biometric_api_v1_biometric_enroll_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/biometric/verify:
    post:
      tags:
      - Biometric
      summary: Verify Biometric
      operationId: verify_biometric_api_v1_biometric_verify_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/liveness/challenge:
    post:
      tags:
      - Liveness
      summary: Request Liveness Challenge
      description: Gera um desafio de prova de vida para o utilizador (válido 45s).
      operationId: request_liveness_challenge_api_v1_liveness_challenge_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LivenessChallengeRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Request Liveness Challenge Api V1 Liveness Challenge
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/liveness/verify:
    post:
      tags:
      - Liveness
      summary: Verify Liveness Challenge
      description: Confirma a acção do desafio e faz match facial contra o template
        local.
      operationId: verify_liveness_challenge_api_v1_liveness_verify_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LivenessVerifyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Verify Liveness Challenge Api V1 Liveness Verify Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/fingerprint/enroll:
    post:
      tags:
      - Fingerprint
      summary: Enroll Fingerprint
      description: Regista um template de impressão digital para um utilizador.
      operationId: enroll_fingerprint_api_v1_fingerprint_enroll_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FingerprintEnrollRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FingerprintResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/fingerprint/identify:
    post:
      tags:
      - Fingerprint
      summary: Identify Fingerprint
      description: 'Identifica um utilizador a partir de um template de impressão
        digital.


        Nota: Esta implementacao compara templates de forma exacta (placeholder).

        Em producao, deve usar um algoritmo de matching de minutias (ISO/IEC 19794-2)

        fornecido pelo SDK do leitor.'
      operationId: identify_fingerprint_api_v1_fingerprint_identify_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FingerprintVerifyRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FingerprintResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/fingerprint/enroll/{user_id}:
    delete:
      tags:
      - Fingerprint
      summary: Delete Fingerprint Enrollment
      description: Remove o enrolamento de impressão digital de um utilizador.
      operationId: delete_fingerprint_enrollment_api_v1_fingerprint_enroll__user_id__delete
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: finger_type
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Finger Type
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Delete Fingerprint Enrollment Api V1 Fingerprint Enroll  User
                  Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit/logs:
    get:
      tags:
      - Audit
      summary: List Audit Logs
      description: 'Logs de auditoria, delegado no Nexora ERP (`GET /api/audit-logs`).


        O ERP é quem decide quem pode ver auditoria (`auditoria:ver_logs`, via

        `RequirePermission`) — não há verificação de papel adicional aqui.'
      operationId: list_audit_logs_api_v1_audit_logs_get
      parameters:
      - name: modulo
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Modulo
      - name: user_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
      - name: entidade
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Entidade
      - name: entidade_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Entidade Id
      - name: acao
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Acao
      - name: page
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            minimum: 1
          - type: 'null'
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 100
            minimum: 1
          - type: 'null'
          title: Limit
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Audit Logs Api V1 Audit Logs Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /metrics:
    get:
      tags:
      - Monitoring
      summary: Metrics
      operationId: metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            text/plain:
              schema:
                type: string
  /health:
    get:
      tags:
      - Health
      summary: Healthcheck
      operationId: healthcheck_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties:
                  type: string
                type: object
                title: Response Healthcheck Health Get
  /ready:
    get:
      tags:
      - Health
      summary: Readiness Probe
      description: Verifica se a aplicacao e dependencias estao prontas.
      operationId: readiness_probe_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    CaptureInput:
      properties:
        image_base64:
          type: string
          title: Image Base64
        angle:
          anyOf:
          - type: string
          - type: 'null'
          title: Angle
      type: object
      required:
      - image_base64
      title: CaptureInput
    EnrollRequest:
      properties:
        user_id:
          type: string
          title: User Id
        captures:
          items:
            $ref: '#/components/schemas/CaptureInput'
          type: array
          minItems: 3
          title: Captures
      type: object
      required:
      - user_id
      - captures
      title: EnrollRequest
    EnrollResponse:
      properties:
        template_id:
          type: string
          format: uuid
          title: Template Id
        user_id:
          type: string
          title: User Id
        model_version:
          type: string
          title: Model Version
        status:
          type: string
          title: Status
      type: object
      required:
      - template_id
      - user_id
      - model_version
      - status
      title: EnrollResponse
    FingerprintEnrollRequest:
      properties:
        user_id:
          type: string
          title: User Id
        finger_type:
          type: string
          title: Finger Type
          default: right_thumb
        template_base64:
          type: string
          title: Template Base64
      type: object
      required:
      - user_id
      - template_base64
      title: FingerprintEnrollRequest
    FingerprintResponse:
      properties:
        success:
          type: boolean
          title: Success
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
        message:
          type: string
          title: Message
      type: object
      required:
      - success
      - message
      title: FingerprintResponse
    FingerprintVerifyRequest:
      properties:
        template_base64:
          type: string
          title: Template Base64
      type: object
      required:
      - template_base64
      title: FingerprintVerifyRequest
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LivenessChallengeRequest:
      properties:
        user_id:
          type: string
          title: User Id
      type: object
      required:
      - user_id
      title: LivenessChallengeRequest
    LivenessVerifyRequest:
      properties:
        challenge_id:
          type: string
          title: Challenge Id
        user_id:
          type: string
          title: User Id
        device_id:
          type: string
          format: uuid
          title: Device Id
        frames_base64:
          items:
            type: string
          type: array
          maxItems: 20
          minItems: 4
          title: Frames Base64
        geo_lat:
          anyOf:
          - type: number
          - type: 'null'
          title: Geo Lat
        geo_lng:
          anyOf:
          - type: number
          - type: 'null'
          title: Geo Lng
      type: object
      required:
      - challenge_id
      - user_id
      - device_id
      - frames_base64
      title: LivenessVerifyRequest
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
        input:
          title: Input
        ctx:
          type: object
          title: Context
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
    VerifyRequest:
      properties:
        user_id:
          type: string
          title: User Id
        device_id:
          type: string
          format: uuid
          title: Device Id
        image_base64:
          type: string
          title: Image Base64
        geo_lat:
          anyOf:
          - type: number
          - type: 'null'
          title: Geo Lat
        geo_lng:
          anyOf:
          - type: number
          - type: 'null'
          title: Geo Lng
      type: object
      required:
      - user_id
      - device_id
      - image_base64
      title: VerifyRequest
    VerifyResponse:
      properties:
        match:
          type: boolean
          title: Match
        user_id:
          anyOf:
          - type: string
          - type: 'null'
          title: User Id
        confidence_score:
          type: number
          title: Confidence Score
        liveness_score:
          type: number
          title: Liveness Score
        timestamp:
          type: string
          format: date-time
          title: Timestamp
        reason:
          anyOf:
          - type: string
          - type: 'null'
          title: Reason
      type: object
      required:
      - match
      - confidence_score
      - liveness_score
      - timestamp
      title: VerifyResponse
