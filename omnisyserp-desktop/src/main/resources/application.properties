# Aplicacao
spring.application.name=OmnisysERP Desktop

# Desativar servidor web embutido (app Swing, nao precisa de servidor HTTP)
spring.main.web-application-type=none

# URL do backend controle (FastAPI)
backend.api.url=http://209.126.86.55:8085

# Timeout das chamadas HTTP ao backend (em milliseconds)
backend.api.connect-timeout=5000
backend.api.read-timeout=30000

# UUID fixo que identifica este dispositivo desktop perante o backend
# (deve existir em /api/v1/admin/devices ou ser ignorado graciosamente)
backend.device.id=00000000-0000-0000-0000-000000000099

# Logging
logging.level.root=WARN
logging.level.tech.omnisyserp=INFO
logging.level.org.springframework.web.client=WARN
