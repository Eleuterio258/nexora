<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceClock - Totem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .totem-container { max-width: 600px; width: 100%; padding: 24px; }
        #video { width: 100%; border-radius: 12px; background: #161b22; }
        .result-box { background: #161b22; border-radius: 12px; padding: 16px; margin-top: 16px; }
        .status-ok { color: #3fb950; }
        .status-fail { color: #f85149; }
        .clock-btn { font-size: 1.5rem; padding: 16px 48px; }
    </style>
</head>
<body>

<div class="totem-container">
    <div class="text-center mb-4">
        <h2>FaceClock</h2>
        <p class="text-muted">Registro de Ponto</p>
    </div>

    <!-- Login Section -->
    <div id="loginSection">
        <div class="card bg-dark border-secondary">
            <div class="card-body">
                <h5 class="mb-3">Autenticacao</h5>
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" id="totemUsername" class="form-control bg-dark text-light border-secondary">
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" id="totemPassword" class="form-control bg-dark text-light border-secondary">
                </div>
                <div id="totemLoginError" class="text-danger small mb-2" style="display:none;"></div>
                <button onclick="totemLogin()" class="btn btn-primary w-100">Entrar</button>
            </div>
        </div>
    </div>

    <!-- Camera Section -->
    <div id="cameraSection" style="display:none;">
        <div class="text-center mb-3">
            <span id="userInfo" class="text-muted"></span>
            <button onclick="totemLogout()" class="btn btn-sm btn-outline-danger float-end">Sair</button>
        </div>

        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <div class="text-center mt-3">
            <button onclick="captureAndRegister()" id="captureBtn" class="btn btn-success clock-btn">
                Registrar Ponto
            </button>
        </div>

        <div id="resultBox" class="result-box" style="display:none;">
            <div id="resultContent" class="text-center"></div>
        </div>

        <div class="mt-3">
            <h6>Tipo de Evento:</h6>
            <div class="btn-group w-100">
                <button onclick="setEventType('ENTRY')" id="btn-ENTRY" class="btn btn-outline-success active">Entrada</button>
                <button onclick="setEventType('BREAK_START')" id="btn-BREAK_START" class="btn btn-outline-warning">Pausa</button>
                <button onclick="setEventType('BREAK_END')" id="btn-BREAK_END" class="btn btn-outline-info">Retorno</button>
                <button onclick="setEventType('EXIT')" id="btn-EXIT" class="btn btn-outline-danger">Saida</button>
            </div>
        </div>
    </div>
</div>

<script>
const API_BASE = '/api/v1';
let totemToken = null;
let totemUserId = null;
let currentEventType = 'ENTRY';
let videoStream = null;

async function totemLogin() {
    const username = document.getElementById('totemUsername').value;
    const password = document.getElementById('totemPassword').value;
    const errorEl = document.getElementById('totemLoginError');

    try {
        const resp = await fetch(API_BASE + '/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        });

        if (!resp.ok) {
            const err = await resp.json();
            errorEl.textContent = err.detail || 'Credenciais invalidas.';
            errorEl.style.display = 'block';
            return;
        }

        const data = await resp.json();
        totemToken = data.access_token;
        totemUserId = data.user.id;

        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('cameraSection').style.display = 'block';
        document.getElementById('userInfo').textContent = data.user.full_name;

        startCamera();
    } catch (e) {
        errorEl.textContent = 'Erro de conexao.';
        errorEl.style.display = 'block';
    }
}

function totemLogout() {
    totemToken = null;
    totemUserId = null;
    stopCamera();
    document.getElementById('loginSection').style.display = 'block';
    document.getElementById('cameraSection').style.display = 'none';
}

async function startCamera() {
    try {
        videoStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 640, height: 480 }
        });
        document.getElementById('video').srcObject = videoStream;
    } catch (e) {
        alert('Nao foi possivel acessar a camera: ' + e.message);
    }
}

function stopCamera() {
    if (videoStream) {
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
    }
}

function setEventType(type) {
    currentEventType = type;
    document.querySelectorAll('.btn-group .btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + type).classList.add('active');
}

async function captureAndRegister() {
    const btn = document.getElementById('captureBtn');
    btn.disabled = true;
    btn.textContent = 'Processando...';

    try {
        // Capture frame from video
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        // First verify biometric
        const verifyResp = await fetch(API_BASE + '/biometric/verify', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + totemToken
            },
            body: JSON.stringify({
                user_id: totemUserId,
                device_id: 'totem-web-01',
                image_base64: imageData
            })
        });

        const verifyData = await verifyResp.json();

        const resultBox = document.getElementById('resultBox');
        const resultContent = document.getElementById('resultContent');
        resultBox.style.display = 'block';

        if (verifyData.match) {
            // Now register the clock event
            const now = new Date().toISOString();
            const idempotencyKey = 'totem-' + Date.now() + '-' + Math.random().toString(36).substring(2, 8);

            await fetch(API_BASE + '/clock/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + totemToken
                },
                body: JSON.stringify({
                    idempotency_key: idempotencyKey,
                    user_id: totemUserId,
                    device_id: 'totem-web-01',
                    event_type: currentEventType,
                    recorded_at: now,
                    source: 'ONLINE',
                    confidence_score: verifyData.confidence_score,
                    liveness_score: verifyData.liveness_score
                })
            });

            resultContent.innerHTML =
                '<h4 class="status-ok">Registro Aprovado!</h4>' +
                '<p>Confianca: ' + (verifyData.confidence_score * 100).toFixed(1) + '%</p>' +
                '<p>Liveness: ' + (verifyData.liveness_score * 100).toFixed(1) + '%</p>' +
                '<p class="text-muted">' + new Date().toLocaleString() + '</p>';
        } else {
            resultContent.innerHTML =
                '<h4 class="status-fail">Nao Reconhecido</h4>' +
                '<p>Motivo: ' + (verifyData.reason || 'Falha na verificacao') + '</p>' +
                '<p class="text-muted">Tente novamente ou contate o RH.</p>';
        }
    } catch (e) {
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('resultContent').innerHTML =
            '<h4 class="status-fail">Erro</h4><p>' + e.message + '</p>';
    }

    btn.disabled = false;
    btn.textContent = 'Registrar Ponto';

    // Auto-hide result after 5 seconds
    setTimeout(() => {
        document.getElementById('resultBox').style.display = 'none';
    }, 5000);
}
</script>

</body>
</html>
