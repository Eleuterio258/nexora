services:
  notifications-service:
    build: ./services/notifications-service
    container_name: nexora_notifications
    environment:
      PORT: 3022
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dnotifications
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
      # Email — AWS SES (SMTP)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # AWS SES (SDK)
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_SES_FROM: ${AWS_SES_FROM}
      # WhatsApp Business Cloud API
      WHATSAPP_BUSINESS_PHONE_ID: ${WHATSAPP_BUSINESS_PHONE_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v19.0}
      # Evolution API
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE:-nexora-erp}
      # SMS SMPP
      SMPP_HOST: ${SMPP_HOST}
      SMPP_PORT: ${SMPP_PORT:-2775}
      SMPP_SYSTEM_ID: ${SMPP_SYSTEM_ID}
      SMPP_PASSWORD: ${SMPP_PASSWORD}
      SMPP_SYSTEM_TYPE: ${SMPP_SYSTEM_TYPE}
      SMPP_SOURCE_ADDR: ${SMPP_SOURCE_ADDR:-NEXORA}
      SMPP_SOURCE_TON: ${SMPP_SOURCE_TON:-5}
      SMPP_SOURCE_NPI: ${SMPP_SOURCE_NPI:-0}
      SMPP_DEST_TON: ${SMPP_DEST_TON:-1}
      SMPP_DEST_NPI: ${SMPP_DEST_NPI:-1}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.notifications.rule=Host(`nexora-erp.e258tech.tech`) && PathPrefix(`/api/notifications`)
      - traefik.http.routers.notifications.entrypoints=websecure
      - traefik.http.routers.notifications.tls=true
      - traefik.http.routers.notifications.tls.certresolver=le
      - traefik.http.routers.notifications.middlewares=gateway-protected@file
      - traefik.http.services.notifications.loadbalancer.server.port=3022
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
