services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: nexora_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-nexora}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-nexora_pass}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - nexora_net
    restart: unless-stopped

volumes:
  rabbitmq_data:

networks:
  nexora_net:
    driver: bridge
