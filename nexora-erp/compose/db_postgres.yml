services:
  db_postgres:
    image: postgres:16-alpine
    container_name: nexora_db_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-nexora_erp}
      POSTGRES_USER: ${DB_USER:-nexora}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nexora_pass}
    volumes:
      - db_postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./services:/opt/nexora-services:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexora} -d ${DB_NAME:-nexora_erp}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - nexora_net
    restart: unless-stopped

volumes:
  db_postgres_data:

networks:
  nexora_net:
    driver: bridge
