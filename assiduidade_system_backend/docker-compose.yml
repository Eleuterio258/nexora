services:
  controle-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assiduidade-api
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:admin@pg:5432/faceclock}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      SEED_DATA_ON_STARTUP: "false"
      PORT: "8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      # HTTPS — asseduidade.e258tech.tech
      - "traefik.http.routers.asseduidade.rule=Host(`asseduidade.e258tech.tech`)"
      - "traefik.http.routers.asseduidade.entrypoints=websecure"
      - "traefik.http.routers.asseduidade.tls=true"
      - "traefik.http.routers.asseduidade.tls.certresolver=le"
      - "traefik.http.services.asseduidade.loadbalancer.server.port=8000"
      # Redirect HTTP → HTTPS
      - "traefik.http.routers.asseduidade-http.rule=Host(`asseduidade.e258tech.tech`)"
      - "traefik.http.routers.asseduidade-http.entrypoints=web"
      - "traefik.http.routers.asseduidade-http.middlewares=asseduidade-https"
      - "traefik.http.middlewares.asseduidade-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.asseduidade-https.redirectscheme.permanent=true"

networks:
  backend:
    external: true
