services:
  gestao-escolar-service:
    build: ./services/gestao-escolar-service
    container_name: nexora_gestao_escolar
    environment:
      PORT: 3024
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dgestao_escolar
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.gestaoescolar.rule=Host(`nexora-erp.e258tech.tech`) && PathPrefix(`/api/gestao-escolar`)
      - traefik.http.routers.gestaoescolar.entrypoints=websecure
      - traefik.http.routers.gestaoescolar.tls=true
      - traefik.http.routers.gestaoescolar.tls.certresolver=le
      - traefik.http.routers.gestaoescolar.middlewares=gateway-protected@file
      - traefik.http.services.gestaoescolar.loadbalancer.server.port=3024
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
