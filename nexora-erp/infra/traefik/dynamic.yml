http:
  middlewares:
    gateway-security-headers:
      headers:
        contentTypeNosniff: true
        browserXssFilter: true
        frameDeny: true
        referrerPolicy: strict-origin-when-cross-origin
        customResponseHeaders:
          X-API-Gateway: nexora-traefik

    gateway-compress:
      compress: {}

    gateway-cors:
      headers:
        accessControlAllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        accessControlAllowHeaders:
          - Authorization
          - Content-Type
          - Accept
          - Origin
          - X-Requested-With
          - X-Tenant-Id
          - X-User-Id
          - X-Request-Id
        accessControlExposeHeaders:
          - X-Request-Id
          - X-Auth-User-Id
          - X-Auth-Tenant-Id
        accessControlAllowOriginList:
          - http://localhost
          - http://localhost:3000
          - http://localhost:3001
          - http://127.0.0.1
        addVaryHeader: true

    gateway-public-ratelimit:
      rateLimit:
        average: 100
        burst: 50

    gateway-protected-ratelimit:
      rateLimit:
        average: 300
        burst: 150

    gateway-forward-auth:
      forwardAuth:
        address: http://auth-service:3001/api/auth/gateway/validate
        trustForwardHeader: true
        authResponseHeaders:
          - X-Auth-User-Id
          - X-Auth-Tenant-Id
          - X-Auth-Session-Id
          - X-Auth-User-Email
          - X-Auth-User-Name

    gateway-public:
      chain:
        middlewares:
          - gateway-security-headers
          - gateway-compress
          - gateway-cors
          - gateway-public-ratelimit

    gateway-protected:
      chain:
        middlewares:
          - gateway-security-headers
          - gateway-compress
          - gateway-cors
          - gateway-protected-ratelimit
          - gateway-forward-auth

    gateway-dashboard-auth:
      basicAuth:
        users:
          # ATENÇÃO: Altere estas credenciais antes de publicar!
          # Para gerar um novo hash: htpasswd -nb <user> <password>
          # Ou use uma ferramenta online: https://www.web2generators.com/apache-tools/htpasswd-generator
          # Formato: "username:{HASH}"
          - "admin:$apr1$H6uskkkW$IgXLP6ewTrSuBkTrqE8wj/" # PADRÃO: admin/test - ALTERAR!
