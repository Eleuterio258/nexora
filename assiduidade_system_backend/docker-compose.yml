services:
  controle-api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:admin@pg:5432/faceclock}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      GATEWAY_SHARED_SECRET: ${GATEWAY_SHARED_SECRET:-}
      SEED_DATA_ON_STARTUP: "false"
      PORT: "8000"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - e258techmozambique

networks:
  e258techmozambique:
    external: true
