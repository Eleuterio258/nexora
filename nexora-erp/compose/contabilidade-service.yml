services:
  contabilidade-service:
    build: ./services/contabilidade-service
    container_name: nexora_contabilidade
    environment:
      PORT: 3012
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dcontabilidade
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.contabilidade.rule=PathPrefix(`/api/contabilidade`)
      - traefik.http.routers.contabilidade.entrypoints=web
      - traefik.http.routers.contabilidade.middlewares=gateway-protected@file
      - traefik.http.services.contabilidade.loadbalancer.server.port=3012
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
