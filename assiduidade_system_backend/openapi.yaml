          type: string
          minLength: 6
          title: Pin
      type: object
      required:
      - user_id
      - pin
      title: AdminSetPinRequest
    CaptureInput:
      properties:
        image_base64:
          type: string
          title: Image Base64
        angle:
          anyOf:
          - type: string
          - type: 'null'
          title: Angle
      type: object
      required:
      - image_base64
      title: CaptureInput
    ClockBatchRegisterRequest:
      properties:
        records:
          items:
            $ref: '#/components/schemas/ClockRegisterRequest'
          type: array
          maxItems: 100
          minItems: 1
          title: Records
      type: object
      required:
      - records
      title: ClockBatchRegisterRequest
    ClockRecord:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        user_id:
          type: string
          format: uuid
          title: User Id
        device_id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Device Id
        event_type:
          $ref: '#/components/schemas/EventType'
        recorded_at:
          type: string
          format: date-time
          title: Recorded At
        source:
          $ref: '#/components/schemas/SourceType'
        sync_status:
          type: string
          title: Sync Status
        confidence_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Confidence Score
        liveness_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Liveness Score
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - id
      - user_id
      - event_type
      - recorded_at
      - source
      - sync_status
      - created_at
      title: ClockRecord
    ClockRegisterRequest:
      properties:
        idempotency_key:
          type: string
          title: Idempotency Key
        user_id:
          type: string
          format: uuid
          title: User Id
        device_id:
          type: string
          format: uuid
          title: Device Id
        event_type:
          $ref: '#/components/schemas/EventType'
        recorded_at:
          type: string
          format: date-time
          title: Recorded At
        source:
          $ref: '#/components/schemas/SourceType'
        confidence_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Confidence Score
        liveness_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Liveness Score
        geo_lat:
          anyOf:
          - type: number
          - type: 'null'
          title: Geo Lat
        geo_lng:
          anyOf:
          - type: number
          - type: 'null'
          title: Geo Lng
        image_base64:
          anyOf:
          - type: string
          - type: 'null'
          title: Image Base64
      type: object
      required:
      - idempotency_key
      - user_id
      - device_id
      - event_type
      - recorded_at
      - source
      title: ClockRegisterRequest
