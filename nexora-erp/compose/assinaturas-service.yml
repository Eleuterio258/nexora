services:
  assinaturas-service:
    build: ./services/assinaturas-service
    container_name: nexora_assinaturas
    environment:
      PORT: 3021
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dassinaturas
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.assinaturas.rule=Host(`nexora-erp.e258tech.tech`) && PathPrefix(`/api/assinaturas`)
      - traefik.http.routers.assinaturas.entrypoints=websecure
      - traefik.http.routers.assinaturas.tls=true
      - traefik.http.routers.assinaturas.tls.certresolver=le
      - traefik.http.routers.assinaturas.middlewares=gateway-protected@file
      - traefik.http.services.assinaturas.loadbalancer.server.port=3021
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
