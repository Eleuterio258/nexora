services:
  crm-service:
    build: ./services/crm-service
    container_name: nexora_crm
    environment:
      PORT: 3017
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dcrm
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.crm.rule=Host(`nexora-erp.e258tech.tech`) && PathPrefix(`/api/crm`)
      - traefik.http.routers.crm.entrypoints=websecure
      - traefik.http.routers.crm.tls=true
      - traefik.http.routers.crm.tls.certresolver=le
      - traefik.http.routers.crm.middlewares=gateway-protected@file
      - traefik.http.services.crm.loadbalancer.server.port=3017
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
