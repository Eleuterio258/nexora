services:
  redis:
    image: redis:7.2-alpine
    container_name: nexora_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_pass}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - nexora_net
    restart: unless-stopped

volumes:
  redis_data:

networks:
  nexora_net:
    driver: bridge
