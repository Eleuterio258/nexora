/* FlatLaf Custom Theme Properties */
/* FactPro - Sistema de Faturação */

/* Accent Colors */
@accentColor=#2563eb
@accentColorHover=#1d4ed8
@accentColorFocused=#1d4ed8
@accentSelect=#dbeafe

/* Semantic Colors */
@successColor=#22c55e
@warningColor=#f59e0b
@dangerColor=#ef4444
@infoColor=#3b82f6

/* Component Styles */
Component.focusWidth=1
Component.arc=6
Button.arc=6
Button.margin=4,12,4,12
TextField.margin=4,8,4,8
ComboBox.padding=4

/* Table Styles */
Table.selectionBackground=@accentSelect
Table.selectionForeground=#0f172a
Table.gridColor=#e2e8f0
Table.rowHeight=28

/* Menu Styles */
Menu.selectionBackground=@accentSelect
Menu.selectionForeground=#0f172a

/* ProgressBar */
ProgressBar.arc=6

/* ScrollBar */
ScrollBar.trackArc=6
ScrollBar.thumbArc=6

/* TabbedPane */
TabbedPane.selectedBackground=@accentSelect
TabbedPane.underlineHeight=2

/* Title */
TitlePane.background=@accentColor
TitlePane.foreground=white
TitlePane.unifiedBackground=false

/* Font */
h00.font=+0
h0.font=+0
h1.font=+0
h2.font=+0
h3.font=+0
h4.font=+0

/* Default font */
@fontFamily=Segoe UI
