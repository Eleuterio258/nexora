services:
  centros-custo-service:
    build: ./services/centros-custo-service
    container_name: nexora_centros_custo
    environment:
      PORT: 3019
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dcentros_custo
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.centroscusto.rule=PathPrefix(`/api/centros-custo`)
      - traefik.http.routers.centroscusto.entrypoints=web
      - traefik.http.routers.centroscusto.middlewares=gateway-protected@file
      - traefik.http.services.centroscusto.loadbalancer.server.port=3019
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
