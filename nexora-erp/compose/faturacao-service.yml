services:
  faturacao-service:
    build: ./services/faturacao-service
    container_name: nexora_faturacao
    environment:
      PORT: 3003
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dfaturacao
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.faturacao.rule=PathPrefix(`/api/faturacao`)
      - traefik.http.routers.faturacao.entrypoints=web
      - traefik.http.routers.faturacao.middlewares=gateway-protected@file
      - traefik.http.services.faturacao.loadbalancer.server.port=3003
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
