services:
  logistica-service:
    build: ./services/logistica-service
    container_name: nexora_logistica
    environment:
      PORT: 3023
      DATABASE_URL: postgres://${DB_USER:-nexora}:${DB_PASSWORD:-nexora_pass}@db_postgres:5432/${DB_NAME:-nexora_erp}?options=-csearch_path%3Dlogistica
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-nexora}:${RABBITMQ_PASS:-nexora_pass}@rabbitmq:5672
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db_postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.logistica.rule=PathPrefix(`/api/logistica`)
      - traefik.http.routers.logistica.entrypoints=web
      - traefik.http.routers.logistica.middlewares=gateway-protected@file
      - traefik.http.services.logistica.loadbalancer.server.port=3023
    networks:
      - nexora_net
    restart: unless-stopped

networks:
  nexora_net:
    driver: bridge
