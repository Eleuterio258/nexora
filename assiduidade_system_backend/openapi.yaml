openapi: 3.1.0
info:
  title: FaceClock API
  description: Gateway stateless de captura e validacao biométrica de assiduidade.
    Apenas templates biométricos (face/digital) são persistidos localmente; todo o
    resto é delegado ao Nexora ERP.
  version: 1.0.0
paths:
  /api/v1/authcode/pin/validate:
    post:
      tags:
      - Auth Code
      summary: Validate Pin
      description: Login alternativo por PIN, delegado no Nexora ERP.
      operationId: validate_pin_api_v1_authcode_pin_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PinValidateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Validate Pin Api V1 Authcode Pin Validate Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/authcode/totp/validate:
    post:
      tags:
      - Auth Code
      summary: Validate Totp
      description: Login alternativo por código TOTP, delegado no Nexora ERP.
      operationId: validate_totp_api_v1_authcode_totp_validate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpValidateRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Validate Totp Api V1 Authcode Totp Validate Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/authcode/totp/setup:
    post:
      tags:
      - Auth Code
      summary: Setup Totp
      description: Configura TOTP para o utilizador autenticado, delegado no Nexora
        ERP.
      operationId: setup_totp_api_v1_authcode_totp_setup_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TotpSetupRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Setup Totp Api V1 Authcode Totp Setup Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/authcode/admin/set-pin:
    post:
      tags:
      - Auth Code
      summary: Admin Set Pin
      description: 'Define o PIN de outro utilizador. O Nexora ERP valida a permissão

        `auth:pin_admin` de quem chama — este router só reencaminha o pedido.'
      operationId: admin_set_pin_api_v1_authcode_admin_set_pin_post
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSetPinRequest'
      responses:
        '204':
          description: Successful Response
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/consents:
    post:
      tags:
      - Consents
      summary: Create Consent
      description: 'PROXY ERP: persistência de consentimentos foi movida para o Nexora
        ERP.


        Implementar após criação de POST /api/lgpd/consents no ERP (Fase 6).'
      operationId: create_consent_api_v1_consents_post
      responses:
        '501':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/consents/users/{user_id}/active:
    get:
      tags:
      - Consents
      summary: Get Active Consent
      description: 'PROXY ERP: consulta de consentimentos foi movida para o Nexora
        ERP.'
      operationId: get_active_consent_api_v1_consents_users__user_id__active_get
      responses:
        '501':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/v1/consents/users/{user_id}/revoke:
    post:
      tags:
      - Consents
      summary: Revoke Consent
      description: 'Revogação de consentimento: desactiva templates biométricos locais.


        A persistência da revogação em si (consentimento LGPD) deve ser enviada

        para o Nexora ERP. Este endpoint mantém apenas o efeito local nos templates.'
      operationId: revoke_consent_api_v1_consents_users__user_id__revoke_post
      parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: string
          title: User Id
      - name: Authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-Auth-User-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Id
      - name: X-Auth-User-Role
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-User-Role
      - name: X-Auth-Tenant-Id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Auth-Tenant-Id
      - name: X-Gateway-Secret
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Gateway-Secret
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Revoke Consent Api V1 Consents Users  User Id  Revoke
                  Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/consents/users/{user_id}/biometric-data:
    delete:
      tags:
      - Consents
      summary: Delete Biometric Data
      description: 'Remove dados biométricos locais (direito ao esquecimento LGPD).


        Apaga templates faciais e de impressão digital do FaceClock.

        O consentimento propriamente dito é gerido no ERP.'
